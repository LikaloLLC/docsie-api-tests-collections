[pytest]
testpaths = tests
markers =
    smoke: Quick sanity checks (auth, credits, list)
    content: Content hierarchy CRUD (workspace → shelf → book → version → language → article)
    video: Video-to-docs pipeline (submit, poll, result, generate)
    credits: Credit balance and usage tracking
    files: File upload/download flow
    deployments: Deployment CRUD and cache refresh
    negative: Negative / error path tests
    slow: Tests that take >30s (video processing, exports)
addopts = -v --tb=short
